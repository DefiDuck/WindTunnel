name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests
        run: python -m pytest -q --cov=witness --cov-report=term-missing

      - name: Verify CLI demo flow
        env:
          PYTHONPATH: .
        run: |
          python -m examples.research_agent
          python -m witness perturb baseline.json --type truncate --param fraction=0.75 -o perturbed.json
          python -m witness diff baseline.json perturbed.json --no-color
          python -m witness fingerprint baseline.json --run truncate:fraction=0.5 --run prompt_injection
